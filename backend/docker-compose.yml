services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: cost_split
      POSTGRES_USER: cost_split
      POSTGRES_PASSWORD: cost_split
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cost_split -d cost_split"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - cost_split_postgres_data:/var/lib/postgresql/data

volumes:
  cost_split_postgres_data:

