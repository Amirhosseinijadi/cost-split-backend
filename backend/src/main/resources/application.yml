spring:
  application:
    name: cost-split-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/cost_split}
    username: ${DATABASE_USERNAME:cost_split}
    password: ${DATABASE_PASSWORD:cost_split}
    hikari:
      maximum-pool-size: ${DATABASE_POOL_SIZE:10}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: ${PORT:8080}
  error:
    include-message: never

app:
  coroutines:
    database-parallelism: ${DATABASE_POOL_SIZE:10}
  auth:
    jwt-secret: ${JWT_SECRET:change-this-secret-before-production-use-at-least-32-bytes}
    token-ttl: ${JWT_TOKEN_TTL:30d}
